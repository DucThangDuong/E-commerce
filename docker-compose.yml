version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Ecommerce=${ConnectionStrings}
      - RedisCache=redis:6379
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
      - RabbitMQ__Port=5672
      - Storage__ServiceUrl=http://minio:9000
      - Storage__AccessKey=minioadmin
      - Storage__SecretKey=minioadmin
      - Storage__product_storage=product-storage
      - SecretKey=${SecretKey}
      - Authentication__Google__ClientId=${ClientId}
      - Authentication__Google__ClientSecret=${ClientSecret}
      - MailSettings__UserName=${UserName}
      - MailSettings__Password=${Password}
      - VnPayConfig__TmnCode=${TmnCode}
      - VnPayConfig__HashSecret=${HashSecret}
      - VnPayConfig__BaseUrl=${BaseUrl}}
      - VnPayConfig__ReturnUrl=${ReturnUrl}}
      - VnPayConfig__Version=${Version}}
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ecommerce-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Your_Password123!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Your_Password123!", "-C", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ecommerce-network

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce_db_init
    volumes:
      - ./SQLQuery1.sql:/SQLQuery1.sql
    command: /bin/bash -c "/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P Your_Password123! -C -i /SQLQuery1.sql"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - ecommerce-network

  redis:
    image: redis:alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ecommerce_rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"   # Cổng kết nối AMQP
      - "15672:15672" # Cổng Dashboard Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  minio:
    image: minio/minio:latest
    container_name: ecommerce_minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # Cổng kết nối API S3
      - "9001:9001"   # Cổng điều khiển Web UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

volumes:
  sqlserver_data:
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  ecommerce-network:
    driver: bridge

name: .NET Core CI/CD

on:
  push:
    branches: [ master, ci/cd ]
  pull_request:
    branches: [ master, ci/cd ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5



    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ConnectionStrings__AZURE_SQL_CONNECTIONSTRING: "Server=localhost,1433;Database=EcommerceDB;User Id=sa;Password=CIPassword123!;TrustServerCertificate=True;"
      ConnectionStrings__AzureStorageAccount: "UseDevelopmentStorage=true"
      RedisCache: "localhost:6379"
      RabbitMQ__HostName: "localhost"
      RabbitMQ__UserName: "guest"
      RabbitMQ__Password: "guest"
      RabbitMQ__Port: "5672"
      SecretKey: ${{ secrets.SecretKey }}
      Authentication__Google__ClientId: ${{ secrets.ClientId }}
      Authentication__Google__ClientSecret: ${{ secrets.ClientSecret }}
      MailSettings__UserName: ${{ secrets.UserName }}
      MailSettings__Password: ${{ secrets.Password }}
      VnPayConfig__TmnCode: ${{ secrets.TmnCode }}
      VnPayConfig__HashSecret: ${{ secrets.HashSecret }}
      VnPayConfig__BaseUrl: ${{ secrets.BaseUrl }}
      VnPayConfig__ReturnUrl: ${{ secrets.ReturnUrl }}
      VnPayConfig__Version: ${{ secrets.Version }}

    steps:
      - name: Tải source code về máy ảo
        uses: actions/checkout@v4

      - name: Cài đặt .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore API/API.csproj

      - name: Tiến hành Build project
        run: dotnet build API/API.csproj --no-restore --configuration Release

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-api:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: SSH into Azure VM and Deploy App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_KEY }}
          script: |
            cd ~/app/ecommerce

            docker compose pull api

            docker compose up -d --remove-orphans api

            docker image prune -f